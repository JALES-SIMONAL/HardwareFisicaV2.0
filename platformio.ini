; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32doit-devkit-v1]
platform = espressif32@^7.0.0
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200

; src/display_test.cpp é um sketch avulso de autoteste do display (tem seu
; próprio setup()/loop()) e não deve ser linkado junto com src/main.cpp —
; caso contrário há erro de "multiple definition of setup()/loop()".
; Para rodar o autoteste do display, temporariamente inverta este filtro
; (+<display_test.cpp> -<main.cpp> ...) ou crie um env dedicado.
build_src_filter = +<*> -<display_test.cpp>

lib_deps =
    adafruit/Adafruit NeoPixel
    moononournation/GFX Library for Arduino@1.5.9
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.4
    ricmoo/QRCode@^0.0.1

; Ambiente auxiliar só para checagem de compilação dos autotestes internos
; (docs/VALIDACAO_GERAL.md, Fase 32). Não é o ambiente padrão de build.
[env:esp32doit-devkit-v1-selftest]
extends = env:esp32doit-devkit-v1
build_flags = -D ENABLE_FIRMWARE_SELF_TESTS=1